# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/configuration-reference
version: 2.1

setup: true

orbs:
  continuation: circleci/continuation@0.3.1


executors:
  linux_x64_executor: # declares a reusable executor
    docker:
      - image: secretflow-registry.cn-hangzhou.cr.aliyuncs.com/secretflow/kuscia-ci:0.6
    shell: /bin/bash --login -eo pipefail

commands:
  build_kuscia:
    steps:
      - checkout
      - run:
          name: "make build"
          command: |
            git config --global --add safe.directory ./
            make build

            DIR="/tmp/build/$(head /dev/urandom | base64 | tr -dc A-Za-z0-9 | head -c 8)/linux"
            mkdir -p $DIR
            cp -rf ./build/linux/* $DIR
      - persist_to_workspace:
          root: /tmp/build
          paths:
            - .
jobs:
  # linux_build_kuscia:
  #   parameters:
  #     executor:
  #       type: string
  #   executor: <<parameters.executor>>
  #   steps:
  #     - checkout
  #     - build_kuscia
  image_publish:
    docker:
      - image: cimg/deploy:2024.11.1-node
    shell: /bin/bash --login -eo pipefail
    steps:
      - checkout
      - setup_remote_docker
      - attach_workspace:
          at: /tmp/build
      - run:
          name: Build image and publish
          command: |
            set -ex
            curl cip.cc
            # mv /tmp/build/*/linux ./build/
            
            # IMAGE="secretflow/kuscia"
            # docker build -t $IMAGE:latest -f ./build/dockerfile/kuscia-anolis.Dockerfile .



