# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/configuration-reference
version: 2.1

setup: true

orbs:
  continuation: circleci/continuation@0.3.1

commands:
  build_kuscia:
    steps:
      - checkout
      - run:
          name: "make build"
          command: |
            git config --global --add safe.directory ./
            make build

            DIR="/tmp/build/linux"
            mkdir -p $DIR
            cp -rf ./build/linux/* $DIR
      - persist_to_workspace:
          root: /tmp/build
          paths:
            - linux
# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/configuration-reference/#jobs
jobs:
  linux_build_kuscia:
    parameters:
      executor:
        type: string
    executor: <<parameters.executor>>
    steps:
      - checkout
      - build_kuscia
  image_publish:
    docker:
      - image: cimg/deploy:2023.06.1
    shell: /bin/bash --login -eo pipefail
    steps:
      - checkout
      - setup_remote_docker
      - attach_workspace:
          at: /tmp/build
      - run:
          name: Build image and publish
          command: |
            set -ex
            mv /tmp/build/linux ./build/
            IMAGE="secretflow/kuscia"

            docker build -t secretflow/kuscia:test --platform linux/arm64,linux/amd64 -f ./build/dockerfile/kuscia-anolis.Dockerfile
            export KUSCIA_IMAGE=secretflow/kuscia:test
            docker run --rm $KUSCIA_IMAGE cat /home/kuscia/scripts/deploy/kuscia.sh > kuscia.sh && chmod u+x kuscia.sh
            ./kuscia.sh center

# Orchestrate jobs using workflows
# See: https://circleci.com/docs/configuration-reference/#workflows
workflows:
  kuscia-workflow:
    jobs:
      - linux_build_kuscia:
          filters:
            branches:
              only: /.*/
      - image_publish:
          requires:
            - linux_build_kuscia
          filters:
            branches:
              only: /.*/